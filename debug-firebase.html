<!DOCTYPE html>
<html>
<head>
    <title>Firebase Connection Test</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>
    <h1>Firebase Connection Test</h1>
    <div id="status">Testing connection...</div>
    <div id="details"></div>
    
    <script>
        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyDGwWyixn28OoS9BzgK2MP4P7h6jzkqmf0",
            authDomain: "quote-evaluator.firebaseapp.com",
            projectId: "quote-evaluator",
            storageBucket: "quote-evaluator.firebasestorage.com",
            messagingSenderId: "565749557898",
            appId: "1:565749557898:web:a39130f8e6bb1c4c1edb73"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        const statusDiv = document.getElementById('status');
        const detailsDiv = document.getElementById('details');
        
        // Test 1: Basic connection
        async function testConnection() {
            try {
                // Try to read from a test collection
                const snapshot = await db.collection('test').limit(1).get();
                statusDiv.innerHTML = '<h2 style="color: green;">✅ Firebase Connected Successfully!</h2>';
                detailsDiv.innerHTML += '<p>Connection test passed</p>';
                
                // Test 2: Try to read savedQuotes
                try {
                    const quotesSnapshot = await db.collection('savedQuotes').limit(1).get();
                    detailsDiv.innerHTML += '<p style="color: green;">✅ Can read savedQuotes collection</p>';
                } catch (error) {
                    detailsDiv.innerHTML += '<p style="color: orange;">⚠️ Cannot read savedQuotes: ' + error.message + '</p>';
                    detailsDiv.innerHTML += '<p>Update Firestore rules in Firebase Console</p>';
                }
                
            } catch (error) {
                statusDiv.innerHTML = '<h2 style="color: red;">❌ Firebase Connection Failed</h2>';
                detailsDiv.innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
                
                if (error.code === 'unavailable') {
                    detailsDiv.innerHTML += `
                        <h3>Possible Solutions:</h3>
                        <ul>
                            <li>Check if you're behind a corporate firewall</li>
                            <li>Disable ad blockers and privacy extensions</li>
                            <li>Try a different network (mobile hotspot)</li>
                            <li>Check if *.firebaseio.com is blocked</li>
                            <li>Verify Firebase project is active in console</li>
                        </ul>
                    `;
                }
            }
        }
        
        // Run test
        testConnection();
        
        // Also test with enableNetwork
        db.enableNetwork().then(() => {
            detailsDiv.innerHTML += '<p>Network enabled</p>';
        }).catch((error) => {
            detailsDiv.innerHTML += '<p style="color: red;">Network enable failed: ' + error.message + '</p>';
        });
    </script>
</body>
</html>
